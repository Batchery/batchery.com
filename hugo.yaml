baseURL: https://batchery.github.io/batchery.com
languageCode: en-us
title: Batchery

module:
  # uncomment line below for local development of module
  # workspace: hugo.work
  imports:
    path: github.com/StefMa/hugo-fresh


googleAnalytics: # Put in your tracking code without quotes like this: UA-XXX for universal tracking or G-XXX analytics v4 tracking
# Disables warnings
disableKinds:
- taxonomy
markup:
  goldmark:
    renderer:
      unsafe: true # Allows you to write raw html in your md files

params:
  # Open graph allows easy social sharing. If you don't want it you can set it to false or just delete the variable
  openGraph: true
  # Used as meta data; describe your site to make Google Bots happy
  description:
  # Preloader ensures images are loaded before displaying to the user. If you don't want it uncomment to set it to false
  # preloader: false
  navbarlogo:
  # Logo (from static/images/logos/___)
    image: logos/batcherylogo.png
    link: /
    # Default width/height. Uncomment if you need to change
    # width: 112
    # height: 28
  font:
    name: "Open Sans"
    sizes: [400,600]

    # Footer logos (from static/images/logos/clients/*.svg)
    # urls are optional
    #clientlogos:
    #- logo: kapor
     # url: https://www.kaporcapital.com/
    #- logo: partech
     # url: https://partechpartners.com/
    #- logo: epic
     # url: https://www.epicvc.com/
    #- logo: maven
     # url: https://www.mavenventures.com/
    #- logo: unshackled
      #url: https://www.unshackledvc.com/
  # Customizable navbar. For a dropdown, add a "sublinks" list.
  navbar:
  - title: Program
    url: /program
    sublinks:
    - title: Overview
      url: /program/overview
    - title: Pragmatic AI
      url: /program/pragmatic_ai
    - title: Startup Best Practices
      url: /program/startup_best_practices
    - title: Mentoring
      url: /program/mentoring
  - title: About Us
    sublinks:
    - title: Our Story
      url: /about/story
    - title: Leadership
      url: /about/leadership
    - title: Mentors
      url: /about/mentors
    - title: Contact
      url: /about/contact
  - title: Apply Now
    url: https://www.f6s.com/batchery-pragmatic-ai-batch-20/apply
    button: true

  footer:
    # Logo (from static/images/logos/___)
    logo: batcherylogo.png
    # Social Media Title
    socialmediatitle: Follow Us
    # Social media links (GitHub, Twitter, etc.). All are optional.
    socialmedia:
    - link: https://github.com/Batchery
      # Icons are from Font Awesome
      icon: github
    - link: https://www.linkedin.com/company/the-batchery
      icon: linkedin
    - link: https://www.facebook.com/Batchery
      icon: facebook
    - link: https://x.com/TheBatchery
      icon: twitter
    - link: https://www.instagram.com/batchery
      icon: instagram
    - link: https://www.tiktok.com/@batchery
      icon: at
    bulmalogo: true
    quicklinks:
      column1:
        title: "Programs"
        links:
        - text: Discover features
          link: /
        - text: Why choose our product?
          link: /
        - text: Compare features
          link: /
        - text: Our roadmap
          link: /
        - text: AGB
          link: /agb
      column2:
        title: "Docs"
        links:
        - text: Get started
          link: /
        - text: User guides
          link: /
        - text: Admin guide
          link: /
        - text: Developers
          link: /
      column3:
        title: "Blog"
        links:
        - text: Latest news
          link: /blog/first
        - text: Tech articles
          link: /blog/second

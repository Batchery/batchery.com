    title: What we offer
    subtitle: 
    features:
    - title: Strategic AI Integration
      text: We help you seamlessly incorporate AI into your business model—ensuring it aligns with market demand, revenue goals, and industry trends.
      # Icon (from static/images/illustrations/icons/___.svg)
      icon: ai
    - title: Customized AI Roadmap 
      text: AI implementation isn’t one-size-fits-all. We provide personalized strategies to adapt AI to your business's unique needs and give you a competitive edge.
      icon: ai-agent
    - title: Hands on AI Education
      text: Access exclusive workshops, expert-led seminars, and real-world case studies covering AI business strategy, data ethics, model scalability, and fundraising tactics.
      icon: ai-agent1

baseURL: http://something-fresh.org/
languageCode: en-us
title: Batchery

module:
  # uncomment line below for local development of module
  # workspace: hugo.work
  imports:
    path: github.com/StefMa/hugo-fresh


googleAnalytics: # Put in your tracking code without quotes like this: UA-XXX for universal tracking or G-XXX analytics v4 tracking
# Disables warnings
disableKinds:
- taxonomy
markup:
  goldmark:
    renderer:
      unsafe: true # Allows you to write raw html in your md files

params:
  # Open graph allows easy social sharing. If you don't want it you can set it to false or just delete the variable
  openGraph: true
  # Used as meta data; describe your site to make Google Bots happy
  description:
  # Preloader ensures images are loaded before displaying to the user. If you don't want it uncomment to set it to false
  # preloader: false
  navbarlogo:
  # Logo (from static/images/logos/___)
    image: logos/batcherylogo.png
    link: /
    # Default width/height. Uncomment if you need to change
    # width: 112
    # height: 28
  font:
    name: "Open Sans"
    sizes: [400,600]
  hero:
    # Main hero title
    title: Empowering founders with visionary business ideas to integrate AI into their strategic roadmap.
    # Hero subtitle (optional)
    subtitle: Ignite your startup with AI superpowers. Our AI-powered program harnesses the transformative power of artificial intelligence, propelling your venture to the next level. From ideation to execution, our AI experts will be your co-pilots, unleashing a torrent of innovative solutions and data-driven strategies.
    # Button text
    buttontext: More Info
    # Where the main hero button links to
    buttonlink: "https://www.f6s.com/the-batchery/about"
    # Hero image (from static/images/___)
    image: illustrations/coding-5-61.svg
    # Footer logos (from static/images/logos/clients/*.svg)
    # urls are optional
    #clientlogos:
    #- logo: kapor
     # url: https://www.kaporcapital.com/
    #- logo: partech
     # url: https://partechpartners.com/
    #- logo: epic
     # url: https://www.epicvc.com/
    #- logo: maven
     # url: https://www.mavenventures.com/
    #- logo: unshackled
      #url: https://www.unshackledvc.com/
  # Customizable navbar. For a dropdown, add a "sublinks" list.
  navbar:
  - title: About Us
    url: /
  - title: Programs
    url: /batchery.com/programs/
  - title: Companies
    sublinks:
    - title: Startup Directory
      url: /
    - title: Founder Directory
      url: /
    - title: Mentors
      url: /
 
  - title: Join Us
    url: https://www.f6s.com/batchery-pragmatic-ai-batch-20/apply
    button: true
